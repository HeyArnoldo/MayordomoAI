name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4

      - name: Habilitar corepack (pnpm pineado en packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # Los tipos de los paquetes compartidos (@app/contracts, @app/i18n) viven
      # en su dist/: hay que compilarlos antes de lint/typecheck o la api/web
      # no resuelven el módulo. pnpm respeta el orden topológico entre ellos.
      - name: Build packages compartidos
        run: pnpm --filter "./packages/**" --if-present run build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test
